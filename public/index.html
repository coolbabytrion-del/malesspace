<!DOCTYPE html>
<html>
<head>
  <title>MaleSpace</title>

  <style>
    body {
      margin:0;
      font-family: Arial;
      background:#0f0f0f;
      color:white;
    }

    header {
      display:flex;
      align-items:center;
      justify-content:space-between;
      padding:10px 20px;
      background:#111;
      position:sticky;
      top:0;
    }

    .logo {
      font-weight:bold;
      letter-spacing:3px;
    }

    .layout {
      display:flex;
    }

    .sidebar {
      width:200px;
      background:#111;
      height:100vh;
      padding:15px;
    }

    .sidebar div {
      margin-bottom:15px;
      cursor:pointer;
    }

    .main {
      flex:1;
      padding:20px;
    }

    .grid {
      display:grid;
      grid-template-columns: repeat(auto-fill, minmax(250px,1fr));
      gap:20px;
    }

    .card {
      background:#181818;
      border-radius:10px;
      padding:10px;
    }

    video {
      width:100%;
      border-radius:8px;
    }

    .upload {
      display:flex;
      gap:10px;
    }

    button {
      background:#222;
      color:white;
      border:none;
      padding:6px 10px;
      cursor:pointer;
    }

    .video-page {
      display:none;
    }

    .comments {
      margin-top:10px;
    }

  </style>
</head>

<body>

<header>
  <div class="logo">MALESPACE</div>

  <div class="upload">
    <input id="title" placeholder="Title">
    <input type="file" id="file">
    <button onclick="upload()">Upload</button>
  </div>
</header>

<div class="layout">

  <div class="sidebar">
    <div onclick="home()">Home</div>
    <div>Trending</div>
    <div>Library</div>
  </div>

  <div class="main">

    <!-- HOME -->
    <div id="home" class="grid"></div>

    <!-- VIDEO PAGE -->
    <div id="videoPage" class="video-page">
      <video id="player" controls width="600"></video>
      <h2 id="videoTitle"></h2>

      <button onclick="reactCurrent('like')">C*M</button>
      <button onclick="reactCurrent('dislike')">NO***</button>

      <div class="comments">
        <input id="commentInput">
        <button onclick="addComment()">Comment</button>
        <div id="commentsList"></div>
      </div>
    </div>

  </div>
</div>

<script>

let videos = [];
let currentVideo = null;

async function upload(){
  const file = document.getElementById("file").files[0];
  const title = document.getElementById("title").value;

  const data = new FormData();
  data.append("video", file);
  data.append("title", title);

  await fetch("/upload",{method:"POST",body:data});
  load();
}

async function load(){
  const res = await fetch("/videos");
  videos = await res.json();

  document.getElementById("home").innerHTML = videos.map(v=>`
    <div class="card" onclick="openVideo(${v.id})">
      <video src="${v.url}"></video>
      <h3>${v.title}</h3>
    </div>
  `).join("");
}

function openVideo(id){
  currentVideo = videos.find(v=>v.id===id);

  document.getElementById("home").style.display="none";
  document.getElementById("videoPage").style.display="block";

  document.getElementById("player").src = currentVideo.url;
  document.getElementById("videoTitle").innerText = currentVideo.title;

  renderComments();
}

function home(){
  document.getElementById("home").style.display="grid";
  document.getElementById("videoPage").style.display="none";
}

async function reactCurrent(type){
  await fetch("/react/"+currentVideo.id,{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({type})
  });

  load();
}

async function addComment(){
  const text = document.getElementById("commentInput").value;

  await fetch("/comment/"+currentVideo.id,{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({text})
  });

  load();
  renderComments();
}

function renderComments(){
  document.getElementById("commentsList").innerHTML =
    currentVideo.comments.join("<br>");
}

load();

</script>

</body>
</html>
