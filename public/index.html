<!DOCTYPE html>
<html>
<head>
  <title>MaleSpace</title>
  <style>
    body {
      margin:0;
      font-family:Arial;
      background:#0a0a0a;
      color:white;
    }

    header {
      display:flex;
      justify-content:space-between;
      padding:15px;
      background:#111;
    }

    .logo {
      font-size:20px;
      font-weight:bold;
      letter-spacing:3px;
    }

    .grid {
      display:grid;
      grid-template-columns: repeat(auto-fill, minmax(250px,1fr));
      gap:20px;
      padding:20px;
    }

    .card {
      background:#111;
      border-radius:10px;
      padding:10px;
    }

    video {
      width:100%;
      border-radius:8px;
    }

    button {
      background:#222;
      color:white;
      border:none;
      padding:5px 10px;
      margin:5px;
      cursor:pointer;
    }
  </style>
</head>

<body>

<header>
  <div class="logo">MALESPACE</div>
  <div>
    <input id="title" placeholder="Title">
    <input type="file" id="file">
    <button onclick="upload()">Upload</button>
  </div>
</header>

<div class="grid" id="videos"></div>

<script>
async function upload(){
  const file = document.getElementById("file").files[0];
  const title = document.getElementById("title").value;

  const data = new FormData();
  data.append("video", file);
  data.append("title", title);

  await fetch("/upload",{method:"POST",body:data});
  load();
}

async function load(){
  const res = await fetch("/videos");
  const videos = await res.json();

  document.getElementById("videos").innerHTML = videos.map(v=>`
    <div class="card">
      <video src="${v.url}" controls></video>
      <h3>${v.title}</h3>
      <button onclick="react(${v.id},'like')">C*M ${v.likes}</button>
      <button onclick="react(${v.id},'dislike')">NO*** ${v.dislikes}</button>
    </div>
  `).join("");
}

async function react(id,type){
  await fetch("/react/"+id,{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({type})
  });
  load();
}

load();
</script>

</body>
</html>
